name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # `pretest` builds dist/ + the .ext bundles, which the suite loads.
      - run: npm test

      - run: npm run lint

      # The build artifacts the published package actually ships.
      - run: npm run smoke
      - run: npm run smoke-test
