<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tutuca Storybook</title>
    <link
      rel="stylesheet"
      href="https://marianoguerra.github.io/margaui/themes/theme.css"
    />
    <!--
      Theme before first paint. margaui's dark.css is keyed on [data-theme="dark"]
      alone (no prefers-color-scheme), so without this the page flashes light on a
      dark-preferring machine while the module graph loads. main.js re-resolves the
      same way on mount, and skips a palette whose <link> this already added.
    -->
    <script>
      (() => {
        const want = new URLSearchParams(location.search).get("theme");
        const name = /^[a-z]+$/.test(want ?? "")
          ? want
          : matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        document.documentElement.dataset.theme = name;
        if (name !== "light" && name !== "dark") {
          const link = document.createElement("link");
          link.rel = "stylesheet";
          link.id = "tutuca-theme-" + name;
          link.href =
            "https://marianoguerra.github.io/margaui/themes/" + name + ".css";
          document.head.append(link);
        }
      })();
    </script>
    <!--
      Published page (GitHub Pages → /storybook/). Everything resolves from the CDN
      and from this folder, so it works at the docs site root. All tutuca specifiers
      map to ONE runtime (tutuca-dev.js); tutuca/storybook keeps `tutuca` external so
      it shares that same runtime — required for component scope/identity.

      NOTE: the CDN `@latest` build may predate the `on` lifecycle + `drive` features.
      When it does, those demos are inert here (no crash — unknown example fields are
      ignored; getTests/drive only run in the terminal). Run `bun run storybook`
      locally to exercise the full set against the freshly built local runtime.
    -->
    <script type="importmap">
      {
        "imports": {
          "tutuca": "https://cdn.jsdelivr.net/npm/tutuca@latest/dist/tutuca-dev.js",
          "tutuca/extra": "https://cdn.jsdelivr.net/npm/tutuca@latest/dist/tutuca-dev.js",
          "tutuca/storybook": "https://cdn.jsdelivr.net/npm/tutuca@latest/dist/tutuca-storybook.js",
          "tutuca/components": "https://cdn.jsdelivr.net/npm/tutuca@latest/dist/tutuca-components.js",
          "margaui": "https://cdn.jsdelivr.net/npm/margaui/+esm"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
